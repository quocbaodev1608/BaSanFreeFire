<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>FF TOOL PRO</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <h1 class="logo">FF TOOL PRO</h1>
  <div class="loader"></div>
</div>

<!-- KEY POPUP -->
<div id="keyPopup" class="popup">
  <div class="popup-box">
    <h2>ENTER KEY</h2>
    <input type="text" id="keyInput" placeholder="Nhập key...">
    <button onclick="submitKey()">XÁC NHẬN</button>
    <button onclick="getKey()">GET KEY</button>
    <p id="keyStatus"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h1 class="title">🔥 FF TOOL PRO</h1>

  <!-- VIDEO -->
  <div class="video-box">
    <iframe width="100%" height="200"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ">
    </iframe>
    <button class="btn">Watch Tutorial</button>
  </div>

  <!-- MENU -->
  <div class="menu">

    <div class="box">
      <h3>Aim Assist</h3>
      <label class="switch">
        <input type="checkbox" onchange="toggleEffect(this)">
        <span></span>
      </label>
    </div>

    <div class="box">
      <h3>FOV</h3>
      <input type="range" min="50" max="300" oninput="updateFOV(this.value)">
    </div>

    <div id="fovCircle"></div>

    <div class="box">
      <h3>ESP</h3>
      <button onclick="toast('ESP LINE ON')">Line</button>
      <button onclick="toast('ESP BOX ON')">Box</button>
      <button onclick="toast('ESP HP ON')">HP</button>
    </div>

    <div class="box">
      <h3>FPS BOOST</h3>
      <button onclick="boost()">BOOST</button>
    </div>

    <div class="box">
      <h3>Speed</h3>
      <input type="range" min="1" max="10">
    </div>

  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

</body>
</html>
