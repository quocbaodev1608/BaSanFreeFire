<div class="menu">

  <div class="box">
    <h3>Nhẹ Tâm</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggleEffect(this,'Nhẹ Tâm')">
      <span></span>
    </label>
  </div>

  <div class="box">
    <h3>Giảm Rung</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggleEffect(this,'Giảm Rung')">
      <span></span>
    </label>
  </div>

  <div class="box">
    <h3>Lố (Boost)</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggleEffect(this,'Lố')">
      <span></span>
    </label>
  </div>

  <!-- TAB ĐỘ NHẠY -->
  <div class="box">
    <h3>Độ Nhạy</h3>

    <select onchange="setSensitivity(this.value)">
      <option value="">Chọn dòng máy</option>
      <option value="low">Máy yếu</option>
      <option value="mid">Máy tầm trung</option>
      <option value="high">Máy mạnh</option>
    </select>

    <div id="sensResult"></div>
  </div>

</div>
